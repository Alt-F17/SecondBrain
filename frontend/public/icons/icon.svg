<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7000ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="128" fill="#080808"/>
  <g transform="translate(256, 256)">
    <!-- Brain icon -->
    <path d="M-80,-60 C-80,-100 -40,-120 0,-120 C40,-120 80,-100 80,-60 C100,-60 120,-40 120,0 C120,40 100,60 80,60 C80,100 40,120 0,120 C-40,120 -80,100 -80,60 C-100,60 -120,40 -120,0 C-120,-40 -100,-60 -80,-60" 
          fill="url(#grad)" 
          stroke="none"/>
    <!-- Center line -->
    <line x1="0" y1="-100" x2="0" y2="100" stroke="#080808" stroke-width="8"/>
    <!-- Brain wrinkles left -->
    <path d="M-60,-40 Q-80,-20 -60,0 Q-80,20 -60,40" fill="none" stroke="#080808" stroke-width="6" stroke-linecap="round"/>
    <path d="M-30,-60 Q-50,-40 -30,-20" fill="none" stroke="#080808" stroke-width="6" stroke-linecap="round"/>
    <path d="M-30,20 Q-50,40 -30,60" fill="none" stroke="#080808" stroke-width="6" stroke-linecap="round"/>
    <!-- Brain wrinkles right -->
    <path d="M60,-40 Q80,-20 60,0 Q80,20 60,40" fill="none" stroke="#080808" stroke-width="6" stroke-linecap="round"/>
    <path d="M30,-60 Q50,-40 30,-20" fill="none" stroke="#080808" stroke-width="6" stroke-linecap="round"/>
    <path d="M30,20 Q50,40 30,60" fill="none" stroke="#080808" stroke-width="6" stroke-linecap="round"/>
    <!-- Glow dots -->
    <circle cx="-45" cy="-70" r="8" fill="rgba(255,255,255,0.6)"/>
    <circle cx="50" cy="70" r="6" fill="rgba(255,255,255,0.4)"/>
  </g>
</svg>
